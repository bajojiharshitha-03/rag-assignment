<!DOCTYPE html>

<html>
<head>
<title>RAG Assistant</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
margin-top:50px;
}

.container{
width:400px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#chat{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin-bottom:10px;
}

.user{
color:blue;
}

.bot{
color:green;
}

input{
width:75%;
padding:8px;
}

button{
padding:8px;
}
</style>

</head>

<body>

<div class="container">
<h2>RAG Assistant</h2>

<div id="chat"></div>

<input id="message" placeholder="Type your question"/>
<button onclick="sendMessage()">Send</button>

</div>

<script>
async function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value;
    if(!message) return;

    let chat = document.getElementById("chat");
    chat.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;
    input.value = ""; // Clear input immediately

    // Add Loading State
    let loadingDiv = document.createElement("div");
    loadingDiv.innerText = "Bot is thinking...";
    chat.appendChild(loadingDiv);

    try {
        let response = await fetch("http://127.0.0.1:8000/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        });
        let data = await response.json();
        
        chat.removeChild(loadingDiv); // Remove loading
        chat.innerHTML += `<div class="message bot"><b>Bot:</b> ${data.answer}</div>`;
    } catch (err) {
        loadingDiv.innerText = "Error connecting to server.";
    }

    chat.scrollTop = chat.scrollHeight; // Auto-scroll
}
</script>
</body>
</html>
